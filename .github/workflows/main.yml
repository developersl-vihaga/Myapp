name: Extract ZIP to Repository Root (Fully Flattened)

on:
  push:
    branches: [ "main" ]   # ඔබගේ branch එක main නැතිනම් master ලෙස වෙනස් කරන්න
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and flatten zip contents to root
        run: |
          echo "📦 Extracting cloud-apk-compiler.zip..."
          mkdir temp_extract
          unzip -o cloud-apk-compiler.zip -d temp_extract

          cd temp_extract

          # temp_extract එකේ තියෙන්නේ එකම එක folder එකක්ද (උදා: cloud-apk-compiler/) කියලා බලන්න
          items=(*)
          if [ ${#items[@]} -eq 1 ] && [ -d "${items[0]}" ]; then
            echo "📂 Detected single top-level folder '${items[0]}'. Moving its contents directly to root..."
            cd "${items[0]}"
            # Hidden files (.gitignore වගේ) ටිකත් ගෙනියන්න
            shopt -s dotglob
            mv * ../../
            cd ../..
          else
            echo "📄 Moving all extracted items directly to root..."
            shopt -s dotglob
            mv * ../
            cd ..
          fi

          echo "🧹 Cleaning up temporary folder and zip file..."
          rm -rf temp_extract
          rm -f cloud-apk-compiler.zip

          echo "✅ Final contents of repository root:"
          ls -la
