name: Extract and Flatten ZIP to Repository Root

on:
  push:
    branches: [ "main" ]   # ඔබගේ branch එක main නැතිනම් master හෝ ඔබගේ branch නමට වෙනස් කරන්න
  workflow_dispatch:       # Manualව run කිරීමට

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and flatten cloud-apk-compiler.zip to root
        run: |
          echo "Extracting cloud-apk-compiler.zip to temporary folder..."
          mkdir temp_extract
          unzip -o cloud-apk-compiler.zip -d temp_extract

          echo "Moving all contents to repository root (flattening)..."
          # temp_extract එකේ ඇතුළත තියෙන සියලුම files/folders root එකට ගෙනියන්න
          find temp_extract -mindepth 1 -maxdepth 1 -exec mv -t . {} +

          echo "Cleaning up temporary folder and zip file..."
          rm -rf temp_extract
          rm -f cloud-apk-compiler.zip

          echo "Final contents of repository root:"
          ls -la
